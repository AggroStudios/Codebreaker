<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prestige — Codebreaker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=block" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body, #root { height: 100%; margin: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: rgba(255,255,255,0.87);
    background: #0d1318;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  .scene-bg {
    position: fixed; inset: 0; z-index: -1;
    background:
      linear-gradient(rgba(8,14,18,0.82), rgba(8,14,18,0.88)),
      url('./neuralNet_bg.png');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
  }

  body.scanlines::after {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 9999;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px
    );
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(10,245,176,0.2); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(10,245,176,0.4); }

  .msym {
    font-family: 'Material Symbols Rounded';
    font-weight: normal; font-style: normal;
    font-size: 20px; display: inline-block; line-height: 1;
    letter-spacing: normal; text-transform: none;
    white-space: nowrap; word-wrap: normal; direction: ltr;
    -webkit-font-feature-settings: 'liga'; font-feature-settings: 'liga';
    -webkit-font-smoothing: antialiased; user-select: none;
  }

  @keyframes statusPulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(10,245,176,0.5); }
    50%      { opacity: 0.55; box-shadow: 0 0 0 5px rgba(10,245,176,0); }
  }
  .live-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #0af5b0; box-shadow: 0 0 6px #0af5b0;
    animation: statusPulse 1.6s ease-in-out infinite;
    flex-shrink: 0; display: inline-block;
  }

  @keyframes scanX {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(200%); }
  }

  /* Glow ring around the giant Prestige CTA when armed */
  @keyframes armedRing {
    0%, 100% { box-shadow: 0 0 0 0 rgba(10,245,176,0.5), 0 0 18px rgba(10,245,176,0.35) inset; }
    50%      { box-shadow: 0 0 0 10px rgba(10,245,176,0), 0 0 24px rgba(10,245,176,0.55) inset; }
  }
  .armed-ring { animation: armedRing 1.8s ease-in-out infinite; }

  /* Skill-tree node pulses */
  @keyframes nodeReadyPulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.06); }
  }
  .node-ready { animation: nodeReadyPulse 1.8s ease-in-out infinite; }

  @keyframes edgeFlow {
    to { stroke-dashoffset: -24; }
  }
  .edge-active { animation: edgeFlow 1.6s linear infinite; }

  /* Tree canvas takes pointer cursor */
  .tree-canvas { cursor: grab; }
  .tree-canvas.dragging { cursor: grabbing; }
</style>
</head>
<body class="scanlines">
<div class="scene-bg"></div>
<div id="root"></div>

<script type="text/babel" src="./tweaks-panel.jsx?v=1"></script>
<script type="text/babel" src="./station-mui.jsx?v=1"></script>
<script type="text/babel" src="./prestige-tree.jsx?v=1"></script>
<script type="text/babel" src="./prestige-page.jsx?v=1"></script>
</body>
</html>
